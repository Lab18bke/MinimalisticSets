<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Failed</title>
  <meta name="description" content="Payment cancelled or failed">
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <div class="success-container">
    <div class="checkmark fail-mark">
      <svg viewBox="0 0 24 24">
        <line x1="6" y1="6" x2="18" y2="18"></line>
        <line x1="18" y1="6" x2="6" y2="18"></line>
      </svg>
    </div>
    <h1 class="success-title">Payment Failed</h1>
    <p class="success-sub">Your payment was cancelled or could not be processed.</p>
    <a href="/" class="back-link">Try Again</a>
  </div>

  <script>
    fetch('/api/config')
      .then(r => r.json())
      .then(d => {
        document.title = `${d.storeName} — Failed`;
      });
  </script>
</body>

</html>
